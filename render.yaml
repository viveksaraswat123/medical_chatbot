services:
  - type: web
    name: mediBot-backend
    runtime: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1 --log-level info"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: LLM_MODEL
        value: "llama-3.3-70b-versatile"
      - key: LOG_LEVEL
        value: "INFO"
      - key: LOG_FILE
        value: "/tmp/medibot.log"