<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medibot – Chat</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { 
    box-sizing: border-box;
    margin: 0;
    padding: 0;
   }

  :root {
    --cream:  #faf8f4;
    --warm:   #f2ede4;
    --ink:    #1c1a17;
    --soft:   #6b6560;
    --teal:   #2a7d6f;
    --teal2:  #1f5e54;
    --teal-lt:#e6f4f1;
    --line:   #e3ddd5;
    --danger: #c0392b;
    --navy:   #1c1a17;
  }

  html, body {
    height: 100%; height: 100dvh;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    background: var(--cream);
  }

  /* layout */
  .app {
    display: flex;
    height: 100dvh;
    position: relative;
    overflow: hidden;
  }

  /* sidebar */
  #sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--ink);
    display: flex;
    flex-direction: column;
    transition: transform .3s cubic-bezier(.16,1,.3,1);
  }

  .sb-top {
    padding: 18px 16px 14px;
    border-bottom: 1px solid rgba(255,255,255,.08);
  }

  .sb-logo {
    font-family: 'Instrument Serif', serif;
    font-size: 1.15rem;
    color: white;
    text-decoration: none;
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px;
  }
  .sb-logo-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--teal);
    flex-shrink: 0;
    margin-top: 1px;
  }

  .new-btn {
    width: 100%;
    background: rgba(42,125,111,.15);
    border: 1px solid rgba(42,125,111,.3);
    color: #7ecfc4;
    padding: 9px 13px;
    border-radius: 9px;
    font-family: 'DM Sans', sans-serif;
    font-size: .84rem; font-weight: 400;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: background .2s;
  }
  .new-btn:hover { background: rgba(42,125,111,.25); }

  .sb-section-label {
    padding: 14px 16px 6px;
    font-size: .68rem;
    font-weight: 500;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: rgba(255,255,255,.3);
  }

  #chatList {
    flex: 1; overflow-y: auto;
    padding: 0 8px 12px;
    display: flex; flex-direction: column; gap: 2px;
  }

  .chat-item {
    display: flex; align-items: center;
    border-radius: 8px;
    padding: 2px 4px 2px 8px;
    transition: background .15s;
  }
  .chat-item:hover { background: rgba(255,255,255,.06); }
  .chat-item.active { background: rgba(42,125,111,.18); }

  .chat-item-btn {
    flex: 1; background: none; border: none;
    color: rgba(255,255,255,.65);
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: .83rem; font-weight: 300;
    padding: 8px 0;
    cursor: pointer;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }
  .chat-item.active .chat-item-btn { color: #7ecfc4; font-weight: 400; }

  .del-btn {
    background: none; border: none;
    color: rgba(255,255,255,.2);
    cursor: pointer; font-size: 11px;
    padding: 4px 6px; border-radius: 5px;
    transition: color .15s, background .15s;
    flex-shrink: 0;
  }
  .del-btn:hover { color: #e08080; background: rgba(192,57,43,.12); }

  /* ── MAIN ── */
  .chat-main {
    flex: 1; display: flex; flex-direction: column;
    background: var(--cream);
    min-width: 0;
  }

  .chat-header {
    background: white;
    border-bottom: 1px solid var(--line);
    padding: 13px 20px;
    display: flex; align-items: center; gap: 12px;
  }

  .hamburger {
    background: none; border: none;
    color: var(--soft); cursor: pointer;
    font-size: 16px; padding: 5px 7px;
    border-radius: 7px; display: none;
    transition: background .15s;
  }
  .hamburger:hover { background: var(--teal-lt); color: var(--teal); }

  .header-logo {
    font-family: 'Instrument Serif', serif;
    font-size: 1.05rem;
    color: var(--ink);
    display: flex; align-items: center; gap: 7px;
    flex: 1;
  }
  .header-logo-dot {
    width: 6px; height: 6px;
    border-radius: 50%; background: var(--teal);
  }
  .header-status {
    font-family: 'DM Sans', sans-serif;
    font-size: .72rem; color: var(--teal);
    font-weight: 400;
    margin-left: 4px;
    margin-top: 1px;
  }

  .back-btn {
    background: none;
    border: 1px solid var(--line);
    color: var(--soft);
    padding: 6px 14px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: .8rem; font-weight: 400;
    cursor: pointer;
    transition: border-color .2s, color .2s;
    text-decoration: none;
    display: inline-block;
  }
  .back-btn:hover { border-color: var(--teal); color: var(--teal); }

  /* ── MESSAGES ── */
  #messages {
    flex: 1; overflow-y: auto;
    padding: 28px 24px;
    display: flex; flex-direction: column; gap: 16px;
  }

  .empty-state {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; gap: 10px;
    color: var(--soft);
    padding-bottom: 60px;
  }
  .empty-icon { font-size: 32px; margin-bottom: 4px; }
  .empty-state h3 {
    font-family: 'Instrument Serif', serif;
    font-size: 1.3rem; font-weight: 400;
    color: var(--ink);
  }
  .empty-state p {
    font-size: .85rem; font-weight: 300;
    max-width: 280px; line-height: 1.65;
  }

  .msg-row { display: flex; gap: 10px; align-items: flex-end; }
  .msg-row.user-row { flex-direction: row-reverse; }

  .bot-avatar {
    width: 28px; height: 28px; flex-shrink: 0;
    border-radius: 8px;
    background: var(--teal-lt);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    margin-bottom: 2px;
  }

  .bubble {
    max-width: 68%;
    padding: 11px 15px;
    border-radius: 16px;
    font-size: .88rem;
    line-height: 1.7;
    animation: fadeUp .2s ease;
    font-weight: 300;
  }
  .bubble.user {
    background: var(--teal);
    color: white;
    border-radius: 16px 16px 4px 16px;
    font-weight: 400;
  }
  .bubble.bot {
    background: white;
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 16px 16px 16px 4px;
  }
  .bubble.bot p { margin-bottom: 6px; }
  .bubble.bot p:last-child { margin-bottom: 0; }
  .bubble.bot strong { color: var(--teal2); font-weight: 500; }
  .bubble.bot ul { padding-left: 18px; margin: 6px 0; }
  .bubble.bot li { margin-bottom: 3px; }
  .bubble.bot hr { border: none; border-top: 1px solid var(--line); margin: 10px 0; }
  .bubble.bot em { color: var(--soft); }

  /* typing */
  .typing-wrap {
    display: flex; gap: 5px; align-items: center;
    padding: 13px 16px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 16px 16px 16px 4px;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--teal); opacity: .4;
    animation: blink 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }

  /* ── INPUT ── */
  .input-area {
    background: white;
    border-top: 1px solid var(--line);
    padding: 12px 20px;
    display: flex; gap: 10px; align-items: center;
  }

  .input-area input {
    flex: 1;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 11px 15px;
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem; font-weight: 300;
    color: var(--ink);
    background: var(--cream);
    outline: none;
    transition: border-color .2s, background .2s;
  }
  .input-area input::placeholder { color: #b5afa8; }
  .input-area input:focus {
    border-color: var(--teal);
    background: white;
  }

  .send-btn {
    background: var(--teal);
    color: white; border: none;
    width: 42px; height: 42px;
    border-radius: 10px;
    cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, transform .1s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--teal2); }
  .send-btn:active { transform: scale(.93); }

  /* ── SIDEBAR OVERLAY (mobile) ── */
  #overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.35); z-index: 50;
  }
  #overlay.show { display: block; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes blink {
    0%, 80%, 100% { opacity: .4; transform: scale(1); }
    40%            { opacity: 1;  transform: scale(1.3); }
  }

  /* ── MOBILE ── */
  @media (max-width: 720px) {
    #sidebar {
      position: absolute; left: 0; top: 0; height: 100%;
      transform: translateX(-100%); z-index: 60;
    }
    #sidebar.open { transform: translateX(0); }
    .hamburger { display: flex !important; }
    .bubble { max-width: 82%; }
  }
</style>
</head>
<body>

<div class="app">

  <div id="overlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-top">
      <a href="/" class="sb-logo">
        <div class="sb-logo-dot"></div>
        Medibot
      </a>
      <button class="new-btn" onclick="createNewChat()">
        + New chat
      </button>
    </div>
    <div class="sb-section-label">Recent</div>
    <div id="chatList"></div>
  </div>

  <!-- MAIN -->
  <div class="chat-main">

    <div class="chat-header">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <div class="header-logo">
        <div class="header-logo-dot"></div>
        Medibot
        <span class="header-status">· online</span>
      </div>
      <a href="/" class="back-btn">← Home</a>
    </div>

    <div id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon"></div>
        <h3>What's on your mind?</h3>
        <p>Ask about symptoms, medications, wellness — anything health-related.</p>
      </div>
    </div>

    <div class="input-area">
      <input id="msgInput" placeholder="Ask a question..."
        onkeydown="if(event.key==='Enter') sendMessage()">
      <button class="send-btn" onclick="sendMessage()">↑</button>
    </div>

  </div>
</div>

<script>
const API = "/api";
const token   = localStorage.getItem("token");
const user_id = localStorage.getItem("user_id");
let conversation_id = null;

if (!token || !user_id) window.location.href = "/login";

/* sidebar */
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
}
function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}

/* chat list */
async function loadChats() {
  try {
    const r = await fetch(`${API}/chat_list`, { headers: { Authorization: `Bearer ${token}` } });
    const list = await r.json();
    const el = document.getElementById("chatList");
    el.innerHTML = "";
    if (!list.length) {
      el.innerHTML = `<div style="color:rgba(255,255,255,.25);font-size:.78rem;padding:10px 8px;text-align:center;font-weight:300;">No chats yet</div>`;
      return;
    }
    list.forEach(c => {
      const item = document.createElement("div");
      item.className = "chat-item" + (c.chat_id === conversation_id ? " active" : "");
      item.dataset.id = c.chat_id;
      item.innerHTML = `
        <button class="chat-item-btn" onclick="openChat('${c.chat_id}')">${c.title || "New chat"}</button>
        <button class="del-btn" onclick="deleteChat('${c.chat_id}',event)" title="Delete">✕</button>`;
      el.appendChild(item);
    });
  } catch(e) { console.error(e); }
}

async function createNewChat() {
  try {
    const r = await fetch(`${API}/new_chat`, { method:"POST", headers:{ Authorization:`Bearer ${token}` } });
    const d = await r.json();
    conversation_id = d.chat_id;
    clearMessages();
    loadChats();
    closeSidebar();
  } catch(e) { console.error(e); }
}

async function openChat(id) {
  conversation_id = id;
  closeSidebar();
  document.querySelectorAll(".chat-item").forEach(el => el.classList.toggle("active", el.dataset.id === id));
  try {
    const r = await fetch(`${API}/chat_history/${id}`, { headers:{ Authorization:`Bearer ${token}` } });
    const data = await r.json();
    clearMessages();
    (data.messages || []).forEach(m => appendMsg(m.role || "assistant", m.content || ""));
  } catch(e) { console.error(e); }
}

async function deleteChat(id, e) {
  e.stopPropagation();
  if (!confirm("Delete this chat?")) return;
  try {
    await fetch(`${API}/delete_chat/${id}`, { method:"DELETE", headers:{ Authorization:`Bearer ${token}` } });
    if (conversation_id === id) { conversation_id = null; clearMessages(); }
    loadChats();
  } catch(e) { console.error(e); }
}

/* send */
async function sendMessage() {
  if (!conversation_id) await createNewChat();
  const input = document.getElementById("msgInput");
  const msg = input.value.trim();
  if (!msg) return;
  appendMsg("user", msg);
  input.value = "";
  const typingEl = appendTyping();
  try {
    const r = await fetch(`${API}/chat`, {
      method: "POST",
      headers: { Authorization:`Bearer ${token}`, "Content-Type":"application/json" },
      body: JSON.stringify({ conversation_id, message: msg })
    });
    const d = await r.json();
    typingEl.remove();
    appendMsg("assistant", d.response || "Sorry, I couldn't process that.");
    loadChats();
  } catch {
    typingEl.remove();
    appendMsg("assistant", "Connection error — please try again.");
  }
}

/* rendering */
function appendMsg(role, text) {
  const msgs = document.getElementById("messages");
  const empty = document.getElementById("emptyState");
  if (empty) empty.remove();

  const row = document.createElement("div");
  row.className = "msg-row" + (role === "user" ? " user-row" : "");

  if (role !== "user") {
    const av = document.createElement("div");
    av.className = "bot-avatar";
    av.textContent = "🩺";
    row.appendChild(av);
  }

  const bubble = document.createElement("div");
  bubble.className = "bubble " + (role === "user" ? "user" : "bot");
  let safe = text.replace(/</g,"&lt;").replace(/>/g,"&gt;");
  bubble.innerHTML = marked.parse(safe);
  row.appendChild(bubble);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  return row;
}

function appendTyping() {
  const msgs = document.getElementById("messages");
  const row = document.createElement("div");
  row.className = "msg-row";
  const av = document.createElement("div");
  av.className = "bot-avatar"; av.textContent = "🩺";
  const tw = document.createElement("div");
  tw.innerHTML = `<div class="typing-wrap"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  row.appendChild(av); row.appendChild(tw);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  return row;
}

function clearMessages() {
  document.getElementById("messages").innerHTML = `
    <div class="empty-state" id="emptyState">
      <div class="empty-icon"></div>
      <h3>What's on your mind?</h3>
      <p>Ask about symptoms, medications, wellness — anything health-related.</p>
    </div>`;
}

// init
loadChats();
</script>
</body>
</html>
